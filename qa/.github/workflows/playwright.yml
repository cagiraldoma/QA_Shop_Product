name: QA — Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * *'  # Nightly at 2 AM UTC

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./qa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./qa/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    defaults:
      run:
        working-directory: ./qa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./qa/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:smoke
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'http://localhost:5173' }}
          API_BASE_URL: ${{ secrets.API_BASE_URL || 'http://localhost:3000/api' }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-test-results
          path: ./qa/test-results/
          retention-days: 7

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    defaults:
      run:
        working-directory: ./qa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./qa/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:api
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'http://localhost:5173' }}
          API_BASE_URL: ${{ secrets.API_BASE_URL || 'http://localhost:3000/api' }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: api-test-results
          path: ./qa/test-results/
          retention-days: 7

  e2e-tests:
    name: E2E Tests (${{ matrix.shardIndex }} / ${{ matrix.shardTotal }})
    runs-on: ubuntu-latest
    needs: [smoke-tests, api-tests]
    defaults:
      run:
        working-directory: ./qa
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./qa/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npx playwright test tests/e2e --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'http://localhost:5173' }}
          API_BASE_URL: ${{ secrets.API_BASE_URL || 'http://localhost:3000/api' }}
          CI: true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-test-results-${{ matrix.shardIndex }}
          path: ./qa/test-results/
          retention-days: 14

  allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: [e2e-tests, api-tests]
    if: always()
    defaults:
      run:
        working-directory: ./qa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./qa/package-lock.json
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          path: ./qa/allure-results
          pattern: '*-test-results-*'
      - run: npm run report:allure
      - uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: ./qa/allure-report/
          retention-days: 14
